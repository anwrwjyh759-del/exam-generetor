<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تيسريكت - قارئ الصور</title>
<style>
  body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; text-align: center; padding: 20px; }
 .container { max-width: 600px; margin: auto; }
  button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 25px; margin: 10px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
  button:disabled { background: #475569; }
  input[type="file"] { margin: 15px 0; background: #1e293b; padding: 10px; border-radius: 8px; color: white; width: 90%; }
 .box { background: #1e293b; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: right; white-space: pre-wrap; min-height: 50px; }
  #loading { color: #facc15; display: none; }
</style>
<script src='https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js'></script>
</head>
<body>
<div class="container">
  <h2>📷 تيسريكت</h2>
  <p>ارفع صورة فيها كلام وهيتحول لنص</p>

  <input type="file" id="fileInput" accept="image/*">
  <button id="readBtn">اقرأ الصورة</button>

  <div id="loading">جاري القراءة... استنى شوية أول مرة</div>
  <div class="box" id="output">النص هيظهر هنا</div>
</div>

<script>
document.getElementById('readBtn').onclick = async () => {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('اختار صورة الأول'); return; }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('output').innerText = '';
  document.getElementById('readBtn').disabled = true;

  const worker = await Tesseract.createWorker('ara+eng');
  const { data: { text } = await worker.recognize(file);
  await worker.terminate();

  document.getElementById('output').innerText = text.trim() || 'مفيش نص اتقرأ';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('readBtn').disabled = false;
};
</script>
</body>
</html>
