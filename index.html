<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الامتحانات</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{font-family:'Cairo',sans-serif;background:#0f172a;color:#fff;text-align:center;padding:20px;margin:0}
.container{max-width:700px;margin:auto;background:#1e293b;padding:25px;border-radius:15px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;font-size:16px;box-sizing:border-box}
button{background:#3b82f6;color:#fff;cursor:pointer;font-weight:bold}
.question{background:#334155;padding:15px;margin:10px 0;border-radius:10px;text-align:right}
.paywall{display:none;background:#dc2626;padding:25px;border-radius:10px;margin:20px 0}
.counter{background:#059669;padding:10px;border-radius:8px;margin:10px 0;font-weight:bold}
.expire-date{font-size:14px;color:#a3e635;margin-top:8px}
.code-box{background:#1e293b;border:2px solid #3b82f6;padding:15px;border-radius:10px;margin:15px 0}
.code-box input{background:#0f172a;color:#fff;text-align:center;font-size:18px;letter-spacing:2px}
</style>
</head>
<body>
<div class="container">
<h2>📝 مولد الامتحانات من الصورة</h2>

<div class="counter" id="counter">المحاولات المتبقية: 4</div>
<div class="expire-date" id="expireDate"></div>

<input type="file" id="imageUpload" accept="image/*">
<div id="loading" style="display:none;">بقرأ الصورة... استنى شوية</div>

<div id="quiz"></div>

<!-- شاشة الدفع -->
<div class="paywall" id="paywall">
<h3>انتهت المحاولات أو الاشتراك</h3>
<p>اشترك بـ 100 جنيه لمدة 30 يوم</p>
<p style="font-size:18px">للاشتراك كلمنا واتساب:</p>
<p style="font-size:24px;font-weight:bold;direction:ltr;margin:10px 0">01289590022</p>
<a href="https://wa.me/201289590022?text=عايز+كود+اشتراك+مولد+الامتحانات" class="whatsapp-btn" target="_blank" style="display:inline-block;background:#25D366;color:#fff;padding:12px 25px;border-radius:10px;text-decoration:none;font-weight:bold;margin-top:10px">كلم واتساب</a>

<div class="code-box">
<p>معاك كود التفعيل؟ اكتبه هنا:</p>
<input type="text" id="codeInput" placeholder="مثال: EXAM-1234">
<button onclick="activateWithCode()">تفعيل الاشتراك</button>
<p id="codeMsg" style="font-size:14px;margin-top:8px"></p>
</div>
</div>

</div>

<script>
// أكواد التفعيل - غير الكود ده كل شهر
const VALID_CODES = ["EXAM-2026A", "EXAM-2026B", "EXAM-2026C"];

let attempts = parseInt(localStorage.getItem('attempts') || 4);
let paidUntil = parseInt(localStorage.getItem('paidUntil') || 0);
let now = Date.now();
let isPaid = paidUntil > now;

updateCounter();

document.getElementById('imageUpload').addEventListener('change', async (e) => {
  if(isPaid){
    processImage(e.target.files[0]);
    return;
  }
  if(attempts <= 0){
    document.getElementById('paywall').style.display = 'block';
    return;
  }
  processImage(e.target.files[0]);
});

async function processImage(file){
  if(!file) return;
  document.getElementById('loading').style.display = 'block';
  try{
    const { data: { text } = await Tesseract.recognize(file, 'ara+eng');
    document.getElementById('loading').style.display = 'none';
    generateQuestions(text);
    if(!isPaid){
      attempts--;
      localStorage.setItem('attempts', attempts);
      updateCounter();
      if(attempts <= 0){
        document.getElementById('paywall').style.display = 'block';
      }
    }
  }catch(e){
    alert('حصل خطأ في قراءة الصورة. جرب صورة أوضح');
    document.getElementById('loading').style.display = 'none';
  }
}

function generateQuestions(lessonText){
  let quiz = document.getElementById('quiz');
  quiz.innerHTML = '<h3>الأسئلة المستخرجة:</h3>';
  let sentences = lessonText.split(/[.!؟\n]/).filter(s => s.trim().length > 15).slice(0,5);
  if(sentences.length === 0){
    quiz.innerHTML += '<p>مقدرتش أقرأ نص من الصورة. جرب صورة أوضح</p>';
    return;
  }
  sentences.forEach((s, i) => {
    quiz.innerHTML += `
    <div class="question">
      <b>س${i+1}:</b> ${s.trim()}
      <br><label><input type="radio" name="q${i}"> إجابة أ</label>
      <br><label><input type="radio" name="q${i}"> إجابة ب</label>
      <br><label><input type="radio" name="q${i}"> إجابة ج</label>
    </div>`;
  });
  quiz.innerHTML += '<button onclick="window.print()">طباعة الامتحان</button>';
}

function updateCounter(){
  if(isPaid){
    let daysLeft = Math.ceil((paidUntil - now) / (1000*60*60*24));
    document.getElementById('counter').textContent = '✓ مشترك';
    document.getElementById('expireDate').textContent = `ينتهي بعد ${daysLeft} يوم`;
  } else {
    document.getElementById('counter').textContent = `المحاولات المتبقية: ${attempts}`;
    document.getElementById('expireDate').textContent = '';
  }
}

function activateWithCode(){
  let code = document.getElementById('codeInput').value.trim().toUpperCase();
  let msg = document.getElementById('codeMsg');

  if(VALID_CODES.includes(code)){
    let expireTime = Date.now() + (30 * 24 * 60 * 60 * 1000);
    localStorage.setItem('paidUntil', expireTime);
    localStorage.setItem('attempts', 9999);
    msg.style.color = '#4ade80';
    msg.textContent = 'تم التفعيل بنجاح! الصفحة هتحدث دلوقتي';
    setTimeout(()=>location.reload(), 1500);
  } else {
    msg.style.color = '#f87171';
    msg.textContent = 'الكود غلط أو منتهي. اتأكد من الكود وجرب تاني';
  }
}
</script>
</body>
</html>
