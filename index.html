<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الامتحانات</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{
  font-family:'Cairo',sans-serif;
  background:#0f172a;
  color:#fff;
  text-align:center;
  padding:20px;
  margin:0;
}
.container{
  max-width:700px;
  margin:auto;
  background:#1e293b;
  padding:25px;
  border-radius:15px;
}
input,button{
  margin:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  width:90%;
  font-size:16px;
}
button{
  background:#25D366;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
button:hover{
  background:#1ebe5d;
}
#output,#exam{
  background:#334155;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
  text-align:right;
  min-height:50px;
  white-space:pre-wrap;
}
h1{color:#25D366;}
p{color:#cbd5e1;}
</style>
</head>
<body>
  <div class="container">
    <h1>مولد الامتحانات</h1>
    <p>ارفع صورة فيها أسئلة وهيتحول لنص ويتعمل منه امتحان</p>

    <input type="file" id="imageInput" accept="image/*">
    <button onclick="readImage()">1. اقرأ الصورة</button>

    <div id="output">النص هيظهر هنا...</div>

    <button onclick="generateExam()">2. ولّد الامتحان</button>

    <div id="exam">الامتحان هيظهر هنا...</div>
  </div>

  <script>
    async function readImage() {
      const file = document.getElementById('imageInput').files[0];
      if(!file){
        alert('اختار صورة الأول');
        return;
      }

      document.getElementById('output').innerText = 'جاري القراءة... استنى شوية';

      try{
        const result = await Tesseract.recognize(file, 'ara+eng');
        document.getElementById('output').innerText = result.data.text;
      }catch(err){
        alert('حصل خطأ في القراءة. جرب صورة أوضح');
        document.getElementById('output').innerText = 'فشل في القراءة';
      }
    }

    function generateExam() {
      const text = document.getElementById('output').innerText;
      if(text == 'النص هيظهر هنا...' || text == 'جاري القراءة... استنى شوية' || text == 'فشل في القراءة'){
        alert('اقرأ الصورة الأول');
        return;
      }

      const questions = text.split('\n').filter(line => line.trim()!= '');
      if(questions.length == 0){
        alert('مفيش نص يتقرأ');
        return;
      }

      let examHTML = '<h3>الامتحان:</h3>';
      questions.forEach((q, i) => {
        examHTML += `<p><b>س${i+1}:</b> ${q}</p>`;
      });

      document.getElementById('exam').innerHTML = examHTML;
    }
  </script>
</body>
</html>
