<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الامتحانات</title>
<style>
  body { font-family: 'Cairo', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
 .container { max-width: 600px; margin: auto; }
  button { background: #00ff88; color: black; border: none; padding: 15px 30px; margin: 10px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
  button:disabled { background: #555; cursor: not-allowed; }
  #output, #loading { background: #2e2e4e; padding: 15px; border-radius: 10px; margin-top: 15px; min-height: 50px; white-space: pre-wrap; text-align: right; }
  input[type="file"] { margin: 20px 0; }
</style>
<script src='https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js'></script>
</head>
<body>
<div class="container">
  <h2>ارفع صورة فيها أسئلة وهيتحول لنص ويتعمل منه امتحان</h2>

  <input type="file" id="fileInput" accept="image/*">

  <button id="readBtn">1. اقرأ الصورة</button>
  <div id="loading" style="display:none;">جاري القراءة... استنى شوية</div>
  <div id="output">النص هيظهر هنا...</div>

  <button id="genBtn" disabled>2. ولّد الامتحان</button>
  <div id="exam">الامتحان هيظهر هنا...</div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const readBtn = document.getElementById('readBtn');
const genBtn = document.getElementById('genBtn');
const loading = document.getElementById('loading');
const output = document.getElementById('output');
const exam = document.getElementById('exam');

let extractedText = '';

readBtn.onclick = async () => {
  const file = fileInput.files[0];
  if (!file) { alert('اختار صورة الأول'); return; }

  loading.style.display = 'block';
  output.innerText = '';
  readBtn.disabled = true;

  // تنضيف الصورة قبل القراءة
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = async () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    // تحويل لأبيض وأسود وزيادة التباين
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
      const val = avg > 140? 255 : 0; // لو أغمق من 140 يبقى أسود
      data[i] = data[i + 1] = data[i + 2] = val;
    }
    ctx.putImageData(imageData, 0, 0);

    // قراءة النص من الصورة المنضفة
    const worker = await Tesseract.createWorker('ara+eng');
    const { data: { text } = await worker.recognize(canvas);
    await worker.terminate();

    extractedText = text.trim();
    output.innerText = extractedText || 'مقدرتش أقرأ نص من الصورة';
    loading.style.display = 'none';
    readBtn.disabled = false;
    if (extractedText) genBtn.disabled = false;
  };
};

genBtn.onclick = () => {
  if (!extractedText) return;
  // تقسيم بسيط للأسئلة
  const questions = extractedText.split(/\n/).filter(line => line.trim().length > 10);
  let examHTML = '<h3>الامتحان:</h3>';
  questions.forEach((q, i) => {
    examHTML += `<p><b>${i + 1}.</b> ${q}</p>`;
  });
  exam.innerHTML = examHTML;
};
</script>
</body>
</html>
