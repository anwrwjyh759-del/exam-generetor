<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد الطالب - قارئ مناهج الوزارة</title>
<style>
  body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; text-align: center; padding: 15px; }
.container { max-width: 700px; margin: auto; }
  h2 { color: #38bdf8; }
  button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 25px; margin: 8px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
  button:disabled { background: #475569; cursor: not-allowed; }
  input[type="file"] { margin: 15px 0; background: #1e293b; padding: 10px; border-radius: 8px; color: white; }
 .box { background: #1e293b; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: right; white-space: pre-wrap; }
  #loading { color: #facc15; display: none; }
</style>
<script src='https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js'></script>
</head>
<body>
<div class="container">
  <h2>📚 مساعد الطالب</h2>
  <p>صور صفحة من كتاب الوزارة وهيطلعلك النص والأسئلة</p>

  <input type="file" id="fileInput" accept="image/*">
  <button id="readBtn">1. اقرأ الصفحة</button>

  <div id="loading">جاري القراءة... ممكن تاخد 20 ثانية أول مرة</div>
  <div class="box" id="textOutput">النص المستخرج هيظهر هنا</div>

  <button id="genBtn" disabled>2. ولّد أسئلة وتلخيص</button>
  <div class="box" id="quizOutput">الأسئلة والتلخيص هيظهروا هنا</div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const readBtn = document.getElementById('readBtn');
const genBtn = document.getElementById('genBtn');
const loading = document.getElementById('loading');
const textOutput = document.getElementById('textOutput');
const quizOutput = document.getElementById('quizOutput');

let extractedText = '';

readBtn.onclick = async () => {
  const file = fileInput.files[0];
  if (!file) { alert('اختار صورة الأول'); return; }

  loading.style.display = 'block';
  textOutput.innerText = '';
  readBtn.disabled = true;

  // تنظيف الصورة لتحسين القراءة
  const img = new Image();
  img.src = URL.createObjectURL(file);
  img.onload = async () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
      const val = avg > 140? 255 : 0;
      data[i] = data[i + 1] = data[i + 2] = val;
    }
    ctx.putImageData(imageData, 0, 0);

    const worker = await Tesseract.createWorker('ara+eng');
    const { data: { text } = await worker.recognize(canvas);
    await worker.terminate();

    extractedText = text.trim();
    textOutput.innerText = extractedText || 'مقدرتش أقرأ النص. جرب تصور أوضح أو تقص الصورة على النص بس';
    loading.style.display = 'none';
    readBtn.disabled = false;
    if (extractedText.length > 50) genBtn.disabled = false;
  };
};

genBtn.onclick = () => {
  if (!extractedText) return;

  // تنظيف النص وتقسيمه لجمل
  const sentences = extractedText.split(/[.\n]/).filter(s => s.trim().length > 15);
  const keySentences = sentences.slice(0, 5).join('. ');

  // توليد أسئلة بسيطة من الجمل
  let questions = '<h3>الأسئلة:</h3>';
  for (let i = 0; i < Math.min(5, sentences.length); i++) {
    const q = sentences[i].replace(/هو|هي|هم|هذا|هذه/g, '......');
    questions += `<p><b>${i+1}.</b> أكمل: ${q}</p>`;
  }

  quizOutput.innerHTML = `<h3>التلخيص:</h3><p>${keySentences}...</p>` + questions;
};
</script>
</body>
</html>
